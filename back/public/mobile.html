<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Quiz Arena - Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --bg1: #0a0f1f;
        --bg2: #131c35;
        --cyan: #00f7ff;
        --violet: #9b5cff;
        --pink: #ff3cac;
        --green: #00ff9d;
        --text: #f3faff;
        --muted: #a9bbcf;
        --card: rgba(255, 255, 255, 0.07);
        --border: rgba(0, 247, 255, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top,
            rgba(155, 92, 255, 0.2),
            transparent 25%
          ),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        padding: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 22px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 22px rgba(0, 247, 255, 0.16);
      }

      h1 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 12px rgba(0, 247, 255, 0.5);
      }

      .sub {
        text-align: center;
        color: var(--muted);
        margin-bottom: 22px;
      }

      #joinArea {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        outline: none;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      input::placeholder {
        color: #b4c3d3;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 15px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        color: white;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      #joinBtn {
        background: linear-gradient(90deg, var(--cyan), var(--violet));
        box-shadow: 0 0 16px rgba(0, 247, 255, 0.22);
      }

      #questionText {
        font-size: 1.4rem;
        text-align: center;
        margin: 18px 0;
        line-height: 1.3;
      }

      #choices {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 12px;
      }

      #choices button {
        background: linear-gradient(
          135deg,
          rgba(0, 247, 255, 0.18),
          rgba(255, 60, 172, 0.22)
        );
        border: 1px solid rgba(255, 255, 255, 0.1);
        min-height: 64px;
        box-shadow: 0 0 12px rgba(0, 247, 255, 0.12);
      }

      #choices button:disabled {
        opacity: 0.55;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: none;
      }

      #status {
        margin-top: 18px;
        text-align: center;
        color: var(--green);
        font-weight: bold;
        min-height: 24px;
      }

      .waiting {
        color: var(--muted);
        text-align: center;
        font-size: 0.95rem;
      }

      .ranking {
        font-size: 1.4rem;
        justify-content: space-between;
        display: flex;
        padding: 18px 24px;
        background: linear-gradient(
          90deg,
          rgba(0, 247, 255, 0.2),
          rgba(168, 85, 247, 0.2)
        );
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      #startBtn {
        margin-top: 12px;
        width: 100%;
        background: linear-gradient(90deg, var(--pink), var(--violet));
        box-shadow: 0 0 16px rgba(255, 60, 172, 0.25);
      }

      #choices button.selected {
        transform: scale(1.02);
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
      }

      #choices button.selected:disabled {
        opacity: 1;
        background: linear-gradient(
          135deg,
          rgba(0, 247, 255, 0.3),
          rgba(255, 60, 172, 0.3)
        );
        border: 2px solid white;
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.3);
      }

      #choices button.correct {
        background: linear-gradient(
          135deg,
          rgba(0, 255, 157, 0.32),
          rgba(0, 180, 120, 0.28)
        );
        border: 2px solid #00ff9d;
        box-shadow: 0 0 18px rgba(0, 255, 157, 0.35);
        opacity: 1 !important;
      }

      #choices button.incorrect-selected {
        background: linear-gradient(
          135deg,
          rgba(255, 77, 109, 0.3),
          rgba(255, 60, 172, 0.24)
        );
        border: 2px solid #ff4d6d;
        box-shadow: 0 0 18px rgba(255, 77, 109, 0.3);
        opacity: 1 !important;
      }

      #choices button.dimmed {
        opacity: 0.35;
      }

      .timer-bar {
        width: 100%;
        height: 10px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        margin: 12px 0 16px;
      }

      #timerFill {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, var(--cyan), var(--pink));
        transition: width linear;
        box-shadow: 0 0 12px rgba(0, 247, 255, 0.28);
      }

      .q-fr {
        font-size: 1.3rem;
        margin-bottom: 4px;
      }

      .q-zh {
        font-size: 1rem;
        opacity: 0.7;
        color: var(--muted);
      }

      .choice-fr {
        font-size: 1rem;
      }

      .choice-zh {
        font-size: 0.85rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Quiz Arena</h1>
      <p class="sub">Téléphone joueur</p>

      <div id="joinArea">
        <input type="text" id="playerName" placeholder="Entre ton pseudo" />
        <button id="joinBtn">Rejoindre la partie</button>
      </div>

      <button id="startBtn" style="display: none">Lancer le quiz</button>

      <p id="questionProgress" class="sub">Question 0 / 0</p>
      <h2 id="questionText">En attente d'une question...</h2>
      <div class="timer-bar">
        <div id="timerFill"></div>
      </div>
      <div id="choices"></div>
      <p id="status" class="waiting"></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      function decodeHTML(str) {
        const txt = document.createElement("textarea");
        txt.innerHTML = str;
        return txt.value;
      }

      const playerNameInput = document.getElementById("playerName");
      const joinBtn = document.getElementById("joinBtn");
      const questionText = document.getElementById("questionText");
      const choicesDiv = document.getElementById("choices");
      const status = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const questionProgress = document.getElementById("questionProgress");
      const timerFill = document.getElementById("timerFill");

      let timerInterval = null;
      let currentQuestion = null;
      let hasAnswered = false;
      let selectedChoiceIndex = null;

      joinBtn.addEventListener("click", () => {
        const name = playerNameInput.value.trim();
        socket.emit("registerPlayer", name);
        document.getElementById("joinArea").style.display = "none";
        status.textContent = "Connecté au quiz";
      });

      socket.on("registered", (player) => {
        status.textContent = `Bienvenue ${player.name}`;

        if (player.isHost) {
          startBtn.style.display = "block";
          status.textContent = `Bienvenue ${player.name} — tu es l'hôte`;
        }
      });

      socket.on("hostStatus", ({ isHost }) => {
        if (isHost) {
          startBtn.style.display = "block";
          status.textContent = "Tu es maintenant l'hôte";
        }
      });

      socket.on("newQuestion", (question) => {
        currentQuestion = question;
        hasAnswered = false;
        selectedChoiceIndex = null;

        questionProgress.textContent = `Question ${question.currentQuestionNumber} / ${question.totalQuestions}`;
        questionText.innerHTML = `
        <div class="q-fr">${decodeHTML(question.question.fr)}</div>
        <div class="q-zh">${decodeHTML(question.question.zh)}</div>
      
      `;
        choicesDiv.innerHTML = "";
        status.textContent = "Choisis ta réponse";

        clearInterval(timerInterval);
        timerFill.style.width = "100%";

        let timeLeft = question.duration;

        timerInterval = setInterval(() => {
          timeLeft -= 100;

          const percent = Math.max(0, (timeLeft / question.duration) * 100);
          timerFill.style.width = percent + "%";

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
          }
        }, 100);

        question.choices.forEach((choice, index) => {
          const btn = document.createElement("button");
          btn.innerHTML = `
           <div class="choice-fr">${decodeHTML(choice.fr)}</div>
  <div class="choice-zh">${decodeHTML(choice.zh)}</div>
        `;

          btn.addEventListener("click", () => {
            if (hasAnswered) return;

            socket.emit("submitAnswer", {
              questionId: question.id,
              choiceIndex: index,
            });

            hasAnswered = true;
            selectedChoiceIndex = index;
            status.textContent = "Réponse envoyée !";

            document.querySelectorAll("#choices button").forEach((b, i) => {
              b.disabled = true;

              if (i === index) {
                b.classList.add("selected");
              }
            });
          });

          choicesDiv.appendChild(btn);
        });
      });

      socket.on("revealAnswer", ({ correctIndex }) => {
        clearInterval(timerInterval);
        timerFill.style.width = "0%";

        document.querySelectorAll("#choices button").forEach((btn, index) => {
          btn.disabled = true;

          if (index === correctIndex) {
            btn.classList.add("correct");
          }

          if (index === selectedChoiceIndex && index !== correctIndex) {
            btn.classList.add("incorrect-selected");
          }

          if (
            selectedChoiceIndex !== null &&
            index !== selectedChoiceIndex &&
            index !== correctIndex
          ) {
            btn.classList.add("dimmed");
          }
        });

        if (selectedChoiceIndex === null) {
          status.textContent = "Temps écoulé !";
        } else if (selectedChoiceIndex === correctIndex) {
          status.textContent = "✅ Bonne réponse !";
        } else {
          status.textContent = "❌ Mauvaise réponse !";
        }
      });

      socket.on("quizEnded", (players) => {
        questionProgress.textContent = `Quiz terminé`;
        questionText.textContent = "🏆 Classement final";
        choicesDiv.innerHTML = "";

        const classement = [...players].sort((a, b) => b.score - a.score);

        choicesDiv.innerHTML = classement
          .map((p, i) => {
            const medals = ["🥇", "🥈", "🥉"];
            const medal = medals[i] || "🎯";

            return `
                  <div class="choice ranking">
                      <span>${medal}</span>
                      ${p.name} — ${p.score} pts
                  </div>
                  `;
          })
          .join("");
      });

      startBtn.addEventListener("click", () => {
        socket.emit("startQuiz");
        startBtn.style.display = "none";
      });
    </script>
  </body>
</html>
